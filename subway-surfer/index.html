<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway Surfer - Neo Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="three-error" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;font-family:Arial;padding:20px;z-index:999;background:rgba(0,0,0,0.8);border-radius:12px;max-width:320px;">
        <h2 style="color:#ff6;margin-bottom:10px;">Failed to load game engine</h2>
        <p style="color:#aaa;font-size:14px;line-height:1.6;">Please open this page in Chrome or Safari browser.<br>Telegram in-app browser may not support WebGL.</p>
    </div>
    <script>
    (function(){
        var cdn = document.createElement('script');
        cdn.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
        cdn.onerror = function() {
            // Fallback: try jsdelivr
            var alt = document.createElement('script');
            alt.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js';
            alt.onerror = function() {
                document.getElementById('three-error').style.display = 'block';
            };
            document.head.appendChild(alt);
        };
        document.head.appendChild(cdn);
    })();
    </script>
    <script src="game.js"></script>
</body>
</html>
