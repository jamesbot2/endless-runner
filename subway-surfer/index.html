<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway Surfer - Neo Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="three-error" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;font-family:Arial;padding:20px;z-index:999;background:rgba(0,0,0,0.85);border-radius:12px;max-width:300px;">
        <h2 style="color:#ff6;margin:0 0 10px;font-size:20px;">⚠️ WebGL Required</h2>
        <p style="color:#aaa;font-size:13px;line-height:1.5;margin:0;">This game needs WebGL to run.<br>Please open in Chrome/Safari browser.</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
        onerror="var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js';s.onerror=function(){document.getElementById('three-error').style.display='block';};document.head.appendChild(s);"></script>
    <!-- Game modules (order matters) -->
    <script src="game/constants.js?v=2"></script>
    <script src="game/state.js?v=2"></script>
    <script src="game/audio.js?v=2"></script>
    <script src="game/textures.js?v=2"></script>
    <script src="game/scene.js?v=2"></script>
    <script src="game/player.js?v=2"></script>
    <script src="game/track.js?v=2"></script>
    <script src="game/buildings.js?v=2"></script>
    <script src="game/obstacles.js?v=2"></script>
    <script src="game/coins.js?v=2"></script>
    <script src="game/particles.js?v=2"></script>
    <script src="game/collision.js?v=2"></script>
    <script src="game/ui.js?v=2"></script>
    <script src="game/homelander.js?v=2"></script>
    <script src="game/controls.js?v=2"></script>
    <script src="game/police.js?v=2"></script>
    <script src="game/main.js?v=2"></script>
    <script src="game/account.js?v=2"></script>
</body>
</html>
