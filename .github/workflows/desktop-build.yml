# ===== Endless Runner Desktop — CI Build =====
# Builds, smoke-tests and packages the Electron desktop app.
# Output: win-unpacked portable directory (unsigned).
# Runs on Windows to avoid code-signing restrictions on Linux.

name: Desktop Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ENDLESS_RUNNER_API_BASE_URL:
        description: 'Account server URL'
        required: false
        default: 'http://35.212.200.85:3000'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ENDLESS_RUNNER_API_BASE_URL: ${{ inputs.ENDLESS_RUNNER_API_BASE_URL || 'http://35.212.200.85:3000' }}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/desktop/package-lock.json

      # ── Root-level dependencies & game build ──
      - name: Install root dependencies
        run: npm install

      - name: Build game bundle
        run: npm run build:game

      # ── Desktop Electron build ──
      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Electron (Vite + tsc)
        working-directory: apps/desktop
        run: npm run build

      - name: Smoke test
        working-directory: apps/desktop
        id: smoke
        continue-on-error: false
        run: npm run test:smoke
        env:
          ELECTRON_HEADLESS_CI: '1'

      # ── PVP integration test ──
      - name: Start account server
        shell: powershell
        run: |
          Start-Process -NoNewWindow -FilePath "node" -ArgumentList "server/account-server.js"
          Start-Sleep -Seconds 2

      - name: Start PVP server
        shell: powershell
        run: |
          Start-Process -NoNewWindow -FilePath "node" -ArgumentList "server/pvp-server.js"
          Start-Sleep -Seconds 2

      - name: PVP smoke test
        run: npm run pvp:smoke

      # ── Package ──
      - name: Package (win-unpacked)
        working-directory: apps/desktop
        run: npm run pack
        env:
          ELECTRON_HEADLESS_CI: '1'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Endless-Runner-win-unpacked
          path: apps/desktop/release/win-unpacked/**
          if-no-files-found: error
          retention-days: 14
